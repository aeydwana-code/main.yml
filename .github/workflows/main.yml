
name: MP8 Sanaa System Pro
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run Bot Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: python
        run: |
          import os
          import requests
          from datetime import datetime
          import pytz
          
          def get_prices():
              # جلب الأسعار لـ 4 عملات
              url = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,solana&vs_currencies=usd"
              r = requests.get(url).json()
              
              btc = r['bitcoin']['usd']
              eth = r['ethereum']['usd']
              bnb = r['binancecoin']['usd']
              sol = r['solana']['usd']
              
              # ضبط التوقيت (مثلاً بتوقيت مكة المكرمة)
              tz = pytz.timezone('Asia/Riyadh')
              now = datetime.now(tz).strftime('%Y-%m-%d | %I:%M %p')
              
              return (
                  f"🏢 **نظام صنعاء المطور MP8**\n"
                  f"⏰ {now}\n"
                  "━━━━━━━━━━━━━━━\n"
                  f"🧡 **BTC:** ${btc:,.0f}\n"
                  f"💙 **ETH:** ${eth:,.2f}\n"
                  f"🔸 **BNB:** ${bnb:,.2f}\n"
                  f"💜 **SOL:** ${sol:,.2f}\n"
                  "━━━━━━━━━━━━━━━\n"
                  "📈 **الحالة:** سوق مستقر"
              )

          token = os.getenv('TELEGRAM_TOKEN')
          chat_id = os.getenv('TELEGRAM_CHAT_ID')
          msg = get_prices()
          
          url = f"https://api.telegram.org/bot{token}/sendMessage"
          requests.post(url, json={"chat_id": chat_id, "text": msg, "parse_mode": "Markdown"})
