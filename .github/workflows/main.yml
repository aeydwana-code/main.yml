def get_sensitivity(phone_model):
    # قاعدة بيانات تجريبية للحساسية
    database = {
        "iphone_13": "General: 95, Red Dot: 90, 2x: 85",
        "samsung_s21": "General: 100, Red Dot: 88, 2x: 80",
        "xiaomi_poco": "General: 98, Red Dot: 92, 2x: 90"
    }
    
    result = database.get(phone_model.lower(), "الطراز غير مدعوم حالياً، جرب إعدادات افتراضية: 90/90/90")
    return f"🤖 SYSTEM_LOG: إعدادات الحساسية لـ {phone_model}:\n{result}"

# تجربة التشغيل في الـ Console
print(get_sensitivity("iphone_13"))
