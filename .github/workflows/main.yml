name: MP8_Sanaa_System
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install requests pytz

      - name: Execute System
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: python
        run: |
          import os
          import requests
          from datetime import datetime
          import pytz

          def get_prices():
              url = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,solana&vs_currencies=usd&include_24hr_change=true"
              r = requests.get(url).json()
              data = {
                  "BTC": (r['bitcoin']['usd'], r['bitcoin']['usd_24h_change']),
                  "ETH": (r['ethereum']['usd'], r['ethereum']['usd_24h_change']),
                  "BNB": (r['binancecoin']['usd'], r['binancecoin']['usd_24h_change']),
                  "SOL": (r['solana']['usd'], r['solana']['usd_24h_change'])
              }
              tz = pytz.timezone('Asia/Riyadh')
              now = datetime.now(tz).strftime('%Y-%m-%d | %I:%M %p')
              msg = f"🏦 **نظام صنعاء المطور | MP8**\n"
              msg += f"🗓 {now}\n"
              msg += "━━━━━━━━━━━━━━━\n"
              for coin, (price, change) in data.items():
                  trend = "🟢" if change > 0 else "🔴"
                  msg += f"{trend} **{coin}:** ${price:,.2f}\n"
              msg += "━━━━━━━━━━━━━━━\n"
              msg += "👇 **استخدم الأزرار للوصول السريع**"
              return msg

          token = os.getenv('TELEGRAM_TOKEN')
          chat_id = os.getenv('TELEGRAM_CHAT_ID')
          msg_text = get_prices()

          keyboard = {
              "inline_keyboard": [
                  [
                      {"text": "📸 انستقرام MP8", "url": "https://instagram.com/mp8_sanaa_system"},
                      {"text": "💎 اشتراك VIP", "url": "https://t.me/Aeydwar"}
                  ],
                  [
                      {"text": "📢 قناة التوصيات الرسمية", "url": "https://t.me/MP8_Sanaa_System"}
                  ]
              ]
          }

          url = f"https://api.telegram.org/bot{token}/sendMessage"
          payload = {"chat_id": chat_id, "text": msg_text, "parse_mode": "Markdown", "reply_markup": keyboard}
          requests.post(url, json=payload)
