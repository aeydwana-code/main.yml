
name: MP8 Sanaa System
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # تشغيل تلقائي كل ساعة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Bot Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: python
        run: |
          import os
          import requests
          
          def get_prices():
              url = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin&vs_currencies=usd"
              r = requests.get(url).json()
              btc, eth, bnb = r['bitcoin']['usd'], r['ethereum']['usd'], r['binancecoin']['usd']
              
              return (
                  "⚡️ **المطور MP8 نظام صنعاء**\n"
                  "━━━━━━━━━━━━━━━\n"
                  f"💰 **BTC:** ${btc:,.0f}\n"
                  f"💎 **ETH:** ${eth:,.2f}\n"
                  f"🔸 **BNB:** ${bnb:,.2f}\n"
                  "━━━━━━━━━━━━━━━\n"
                  "✅ تم التحديث بنجاح"
              )

          token = os.getenv('TELEGRAM_TOKEN')
          chat_id = os.getenv('TELEGRAM_CHAT_ID')
          msg = get_prices()
          
          url = f"https://api.telegram.org/bot{token}/sendMessage"
          requests.post(url, json={"chat_id": chat_id, "text": msg, "parse_mode": "Markdown"})
