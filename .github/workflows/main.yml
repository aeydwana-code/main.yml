def get_free_fire_settings(phone_model):
    # قاعدة بيانات الحساسية المحدثة لعام 2026
    database = {
        "iphone": {"Gen": 100, "Red": 95, "2x": 90, "4x": 85, "DPI": "None"},
        "samsung": {"Gen": 98, "Red": 92, "2x": 88, "4x": 80, "DPI": 600},
        "xiaomi": {"Gen": 95, "Red": 90, "2x": 85, "4x": 82, "DPI": 550},
    }
    
    brand = phone_model.lower().split()[0]
    data = database.get(brand, {"Gen": 90, "Red": 90, "2x": 90, "4x": 90, "DPI": "Standard"})
    
    return (f"🔥 إعدادات 'بوت صنعاء' لـ {phone_model}:\n"
            f"━━━━━━━━━━━━━━━\n"
            f"🎯 العام: {data['Gen']}\n"
            f"🔴 النقطة الحمراء: {data['Red']}\n"
            f"🔭 عدسة 2x: {data['2x']}\n"
            f"🔭 عدسة 4x: {data['4x']}\n"
            f"⚙️ الـ DPI المقترح: {data['DPI']}\n"
            f"━━━━━━━━━━━━━━━\n"
            f"💎 بواسطة: MP8 المطور")

# تجربة المحرك
print(get_free_fire_settings("Samsung S23"))
