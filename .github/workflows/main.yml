import os

class SanaaBot:
    def __init__(self):
        self.identity = "MP8"
        self.version = "1.0.0-Stable"
        # قاعدة بيانات الحساسية المحدثة
        self.sensitivity_db = {
            "آيفون": {"عام": 100, "نقطة": 95, "2x": 90, "4x": 85, "DPI": "تلقائي"},
            "سامسونج": {"عام": 98, "نقطة": 92, "2x": 88, "4x": 80, "DPI": 600},
            "شاومي": {"عام": 95, "نقطة": 90, "2x": 85, "4x": 82, "DPI": 550}
        }

    def get_settings(self, phone):
        brand = phone.lower()
        data = self.sensitivity_db.get(brand, {"عام": 90, "نقطة": 90, "2x": 90, "4x": 90, "DPI": "قياسي"})
        
        report = (
            f"🚀 [نظام صنعاء المطور | {self.identity}]\n"
            f"━━━━━━━━━━━━━━━\n"
            f"📱 الجهاز: {phone}\n"
            f"🎯 الحساسية العامة: {data['عام']}\n"
            f"🔴 النقطة الحمراء: {data['نقطة']}\n"
            f"🔭 عدسة 2x: {data['2x']}\n"
            f"🔭 عدسة 4x: {data['4x']}\n"
            f"⚙️ الـ DPI المقترح: {data['DPI']}\n"
            f"━━━━━━━━━━━━━━━\n"
            f"💎 المطور الرئيسي: {self.identity}\n"
            f"📅 التاريخ: 2026-03-19"
        )
        return report

# تشغيل المحرك الأساسي
if __name__ == "__main__":
    bot = SanaaBot()
    # تجربة استخراج الإعدادات
    print(bot.get_settings("آيفون"))
