
name: MP8 Sanaa System Final
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run Bot Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: python
        run: |
          import os
          import requests
          from datetime import datetime
          import pytz
          
          def get_prices():
              # جلب الأسعار مع نسبة التغير
              url = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,solana&vs_currencies=usd&include_24hr_change=true"
              r = requests.get(url).json()
              
              data = {
                  "BTC": (r['bitcoin']['usd'], r['bitcoin']['usd_24_change']),
                  "ETH": (r['ethereum']['usd'], r['ethereum']['usd_24h_change']),
                  "BNB": (r['binancecoin']['usd'], r['binancecoin']['usd_24h_change']),
                  "SOL": (r['solana']['usd'], r['solana']['usd_24h_change'])
              }
              
              tz = pytz.timezone('Asia/Riyadh')
              now = datetime.now(tz).strftime('%Y-%m-%d | %I:%M %p')
              
              msg = f"🏦 **نظام صنعاء المطور | MP8**\n"
              msg += f"🗓 {now}\n"
              msg += "━━━━━━━━━━━━━━━\n"
              
              for coin, (price, change) in data.items():
                  trend = "🟢" if change > 0 else "🔴"
                  msg += f"{trend} **{coin}:** ${price:,.2f}\n"
              
              msg += "━━━━━━━━━━━━━━━\n"
              msg += "📢 **قنواتنا الرسمية:**\n"
              msg += "📸 [Instagram](https://instagram.com/mp8_sanaa_system)\n"
              msg += "📧 Djggggvfvcvjv@gmail.com\n"
              msg += "━━━━━━━━━━━━━━━\n"
              msg += "💎 **للاشتراك في التوصيات الـ VIP تواصل معنا**"
              
              return msg

          token = os.getenv('TELEGRAM_TOKEN')
          chat_id = os.getenv('TELEGRAM_CHAT_ID')
          msg = get_prices()
          
          url = f"https://api.telegram.org/bot{token}/sendMessage"
          requests.post(url, json={"chat_id": chat_id, "text": msg, "parse_mode": "Markdown"})
