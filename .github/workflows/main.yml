import requests, os

# إعدادات الأمان
TOKEN = os.getenv('TELEGRAM_TOKEN')
CHAT_ID = os.getenv('TELEGRAM_CHAT_ID')

def send_to_bot(text):
    url = f"https://api.telegram.org/bot{TOKEN}/sendMessage"
    requests.post(url, json={"chat_id": CHAT_ID, "text": text, "parse_mode": "Markdown"})

def start_capture():
    # رسالة تفعيل الرادار للمستودعات الـ 13
    msg = "🚀 **نظام MP8: تم تفعيل رادار سحب البيانات**\n"
    msg += "-----------------------------------\n"
    msg += "⚙️ الحالة: جاري التحضير لمسح الـ 13 مستودعاً...\n"
    msg += "🔓 المهمة: استخراج ملفات الـ Combo وتصفيتها."
    send_to_bot(msg)

if __name__ == "__main__":
    start_capture()
