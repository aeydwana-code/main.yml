
name: MP8_Sanaa_System
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Libraries
        run: pip install requests pytz
      - name: Execute System
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: python
        run: |
          import os, requests, pytz
          from datetime import datetime
          def get_prices():
              r = requests.get("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,solana&vs_currencies=usd&include_24hr_change=true").json()
              tz = pytz.timezone('Asia/Riyadh')
              now = datetime.now(tz).strftime('%Y-%m-%d | %I:%M %p')
              msg = f"🏦 **نظام صنعاء المطور | MP8**\n🗓 {now}\n━━━━━━━━━━━━━━━\n"
              coins = {"BTC": "bitcoin", "ETH": "ethereum", "BNB": "binancecoin", "SOL": "solana"}
              for sym, name in coins.items():
                  p, c = r[name]['usd'], r[name]['usd_24h_change']
                  msg += f"{'🟢' if c > 0 else '🔴'} **{sym}:** ${p:,.2f}\n"
              msg += "━━━━━━━━━━━━━━━\n👇 **استخدم الأزرار للوصول السريع**"
              return msg
          keyboard = {"inline_keyboard": [[{"text": "📸 انستقرام MP8", "url": "https://instagram.com/mp8_sanaa_system"},{"text": "💎 اشتراك VIP", "url": "https://t.me/Aeydwar"}],[{"text": "📢 قناة التوصيات الرسمية", "url": "https://t.me/MP8_Sanaa_System"}]]}
          requests.post(f"https://api.telegram.org/bot{os.getenv('TELEGRAM_TOKEN')}/sendMessage", json={"chat_id": os.getenv('TELEGRAM_CHAT_ID'), "text": get_prices(), "parse_mode": "Markdown", "reply_markup": keyboard})
